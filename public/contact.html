<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Cosmics Software</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <meta name="description" content="Get in touch with Cosmics Software for inquiries, feedback, or support.">
    <meta name="keywords" content="Cosmics Software, Contact, Support">
    <link rel="canonical" href="https://cards.cosmics.software/contact.html" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .legal-root { min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
        .legal-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid rgba(9,226,125,0.12); background: rgba(8,13,24,0.88); backdrop-filter: blur(14px); }
        .nav-logo { font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; color: #fff; letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-logo:hover { color: var(--green); }
        .nav-omni { width: 28px; height: 28px; background: url('assets/logo.jpg') center/cover; border-radius: 50%; border: 2px solid var(--green); }
        .legal-content { max-width: 800px; margin: 0 auto; padding: 60px 24px; flex: 1; width: 100%; color: rgba(255,255,255,0.8); line-height: 1.7; font-family: 'Exo 2', sans-serif; }
        .legal-content h1 { font-family: 'Bangers', cursive; font-size: 3rem; color: #fff; margin-bottom: 24px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(9,226,125,0.4); }
        .legal-content p { margin-bottom: 16px; font-size: 0.95rem; }
        
        .contact-box { background: rgba(11,18,32,0.95); border: 1px solid rgba(9,226,125,0.25); border-radius: 16px; padding: 32px; margin-top: 32px; display: flex; flex-direction: column; gap: 20px; }
        .inp-form { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 12px; color: #fff; font-family: 'Exo 2', sans-serif; font-size: 0.95rem; width: 100%; outline: none; transition: border-color .2s; }
        .inp-form:focus { border-color: var(--green); background: rgba(9,226,125,0.05); }
        .btn-submit { background: linear-gradient(135deg, var(--green), #06a857); color: #000; font-family: 'Orbitron', monospace; font-weight: 700; letter-spacing: 2px; border: none; padding: 14px 24px; border-radius: 12px; cursor: pointer; transition: transform .2s, box-shadow .2s; text-transform: uppercase; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(9,226,125,0.4); }

        .home-footer { padding: 20px 32px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; background: rgba(8,13,24,0.95); margin-top: auto; }
        .footer-copy { font-size: 0.68rem; color: rgba(255,255,255,0.22); letter-spacing: 0.5px; }
        .footer-links { display: flex; gap: 16px; }
        .footer-link { font-size: 0.68rem; color: rgba(255,255,255,0.28); text-decoration: none; transition: color .15s; }
        .footer-link:hover { color: var(--green); }
        #lightning { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.15; }
        .bolt { position: absolute; width: 2px; background: #fff; box-shadow: 0 0 10px #09e27d, 0 0 20px #09e27d; border-radius: 2px; opacity: 0; animation: flash linear infinite; transform-origin: top center; }
        @keyframes flash { 0%,100%{opacity:0} 1%,5%{opacity:1} 6%,9%{opacity:0} 10%,15%{opacity:1} 16%,99%{opacity:0} }
    </style>
</head>
<body>
    <div id="lightning"></div>
    <div class="legal-root">
        <nav class="legal-nav">
            <a href="/" class="nav-logo">
                <div class="nav-omni"></div>
                COSMICS<span style="font-size:0.6rem;color:var(--green);font-family:'Exo 2',sans-serif;margin-left:4px">SOFTWARE</span>
            </a>
        </nav>
        <div class="legal-content">
            <div style="text-align:center; max-width: 600px; margin: 0 auto;">
                <h1>Contact Cosmics Software</h1>
                <p>Have a bug to report? A feature suggestion? Or maybe you just want to talk about how Upgrade is the best alien? Send us a message!</p>
                
                <form class="contact-box" onsubmit="event.preventDefault(); alert('Message sent! Our team will get back to you soon.');">
                    <input type="text" class="inp-form" placeholder="Your Name or Callsign" required>
                    <input type="email" class="inp-form" placeholder="Your Email Address" required>
                    <textarea class="inp-form" rows="5" placeholder="Your Message..." required style="resize:vertical"></textarea>
                    <button type="submit" class="btn-submit">SEND TRANSMISSION 🚀</button>
                </form>
            </div>
        </div>
        <footer class="home-footer">
            <div class="footer-copy">© 2026 Cosmics Software</div>
            <div class="footer-links">
                <a href="/" class="footer-link">Home</a>
                <a href="about.html" class="footer-link">About</a>
                <a href="contact.html" class="footer-link" style="color:var(--green)">Contact</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms & Conditions</a>
            </div>
        </footer>
    </div>
    <script>
        (function() {
            const c = document.getElementById('lightning');
            const mk = () => {
                const b = document.createElement('div'); b.className = 'bolt';
                const h = 60 + Math.random() * 160;
                b.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;height:${h}px;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
                c.appendChild(b); setTimeout(() => b.remove(), (1.5 + Math.random() * 5) * 1000 + 500);
            };
            for (let i = 0; i < 6; i++) mk(); setInterval(mk, 1200);
        })();
    </script>
</body>
</html>
